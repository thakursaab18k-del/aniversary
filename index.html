<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Anniversary Reel ❤️</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: sans-serif;
    background: black;
}

/* FULL SCREEN SLIDES */
.slideshow {
    position: fixed;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
}

/* MEDIA FULL SCREEN */
.slide {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 1s;
}

.active {
    opacity: 1;
}

/* OVERLAY TEXT */
.overlay {
    position: absolute;
    top: 0;
    width: 100%;
    padding: 20px;
    text-align: center;
    color: white;
    z-index: 10;
    background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
}

.overlay h1 {
    font-size: 6vw;
    margin: 5px;
}

.overlay h2 {
    font-size: 4vw;
    margin: 5px;
}

.overlay p {
    font-size: 3.8vw;
}

/* BOTTOM MESSAGE */
.bottom-msg {
    position: absolute;
    bottom: 20px;
    width: 100%;
    text-align: center;
    color: white;
    font-size: 4vw;
    z-index: 10;
}

/* HEARTS */
.heart {
    position: absolute;
    bottom: -10px;
    font-size: 20px;
    animation: floatUp linear infinite;
    z-index: 5;
}

@keyframes floatUp {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-100vh); opacity: 0; }
}
</style>
</head>

<body>

<!-- 🎬 SLIDES -->
<div class="slideshow">
    <img src="photo1.jpg" class="slide active">
    <img src="photo2.jpg" class="slide">
    <img src="photo3.jpg" class="slide">

    <video class="slide" muted playsinline>
        <source src="video.mp4" type="video/mp4">
    </video>

    <img src="photo4.jpg" class="slide">
</div>

<!-- 💬 TOP TEXT -->
<div class="overlay">
    <h1>🎉 Happy 4th Anniversary 🎉</h1>
    <h2>Bhaiya ❤️ Bhabhi</h2>
    <p>4 years of love & togetherness 💕</p>
</div>

<!-- 💬 BOTTOM TEXT -->
<div class="bottom-msg" id="msg">
    Swipe 👉 or Tap to Enjoy 💖
</div>

<!-- 🎵 MUSIC -->
<audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
let slides = document.querySelectorAll(".slide");
let index = 0;
let startX = 0;
let endX = 0;

const music = document.getElementById("bgMusic");

/* START MUSIC ON TAP */
document.body.addEventListener("click", () => {
    if (music) music.play().catch(()=>{});
});

/* SHOW SLIDE */
function showSlide(i) {
    slides.forEach(slide => {
        slide.classList.remove("active");

        if (slide.tagName === "VIDEO") {
            slide.pause();
            slide.currentTime = 0;
        }
    });

    let current = slides[i];
    current.classList.add("active");

    if (current.tagName === "VIDEO") {
        if (music) music.pause();
        current.play();

        current.onended = () => {
            if (music) music.play();
            nextSlide();
        };
    } else {
        setTimeout(nextSlide, 2500);
    }
}

/* NEXT / PREV */
function nextSlide() {
    index = (index + 1) % slides.length;
    showSlide(index);
}

function prevSlide() {
    index = (index - 1 + slides.length) % slides.length;
    showSlide(index);
}

/* AUTO START */
showSlide(index);

/* SWIPE */
document.addEventListener("touchstart", e => {
    startX = e.touches[0].clientX;
});

document.addEventListener("touchend", e => {
    endX = e.changedTouches[0].clientX;
    let diff = startX - endX;

    if (diff > 50) nextSlide();
    else if (diff < -50) prevSlide();
});

/* HEARTS */
function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "💖";

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (3 + Math.random() * 3) + "s";

    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 6000);
}

setInterval(createHeart, 300);
</script>

</body>
</html>
