<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy 4th Anniversary ❤️</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
            color: white;
            text-align: center;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* TEXT */
        h1 { font-size: 7.5vw; margin: 20px 10px 5px; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
        h2 { font-size: 5vw; margin: 5px; font-weight: 300; }
        .intro-p { font-size: 4vw; margin: 10px 20px; line-height: 1.4; opacity: 0.9; }

        /* 🔥 ENHANCED LARGE FRAME */
        .frame {
            width: 92vw;          /* Slightly wider */
            height: 65vh;         /* Tall enough for a cinematic look */
            margin: 15px auto;    /* Centers the frame perfectly */
            border-radius: 20px;  /* Smooth rounded corners */
            overflow: hidden;
            position: relative;
            background: #000;     /* Prevents white flashes between loads */
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
        }

        .slideshow {
            width: 100%;
            height: 100%;
            position: relative;
        }

        /* MEDIA FULL COVER FIX */
        .slideshow img,
        .slideshow video {
            position: absolute;
            top: 0;               /* FIX: Aligns to top of container */
            left: 0;              /* FIX: Aligns to left of container */
            width: 100%;
            height: 100%;
            object-fit: cover;    /* Ensures media fills the entire frame */
            object-position: center;
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }

        .active {
            opacity: 1 !important;
            z-index: 1;
        }

        /* BUTTONS & MESSAGES */
        button {
            margin-top: 15px;
            padding: 12px 30px;
            border: none;
            border-radius: 50px;
            background: white;
            color: #ff6f91;
            font-size: 5vw;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            cursor: pointer;
            position: relative;
            z-index: 10; /* Keeps button above floating hearts */
        }

        #msg {
            display: none;
            font-size: 4.5vw;
            margin: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(8px);
            border-radius: 15px;
            line-height: 1.6;
            position: relative;
            z-index: 10;
        }

        /* FLOATING HEARTS */
        .heart {
            position: fixed;
            bottom: -10vh;
            font-size: 22px;
            z-index: 0; /* Keeps hearts behind the content */
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>

<body>

    <h1>🎉 Happy 4th Anniversary 🎉</h1>
    <h2>Dear Bhaiya ❤️ Bhabhi</h2>

    <p class="intro-p">
        Celebrating 4 beautiful years of love & laughter 💕<br>
        Your bond is truly inspiring ✨
    </p>

    <div class="frame">
        <div class="slideshow" id="slider">
            <img src="photo1.jpg" class="active">
            <img src="photo2.jpg">
            <img src="photo3.jpg">

            <video muted playsinline>
                <source src="video.mp4" type="video/mp4">
            </video>

            <img src="photo4.jpg">
        </div>
    </div>

    <button id="startBtn" onclick="startExperience()">Start 💖</button>

    <div id="msg">
        May your journey always be filled with endless love ❤️,<br>
        joy 😊, and beautiful memories ✨<br><br>
        <strong>Stay happy forever 🥰</strong>
    </div>

    <audio id="bgMusic" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

<script>
    let slides, index = 0, music, timer, startX = 0;

    document.addEventListener("DOMContentLoaded", () => {
        slides = document.querySelectorAll(".slideshow img, .slideshow video");
        music = document.getElementById("bgMusic");

        // Touch Swipe logic
        const slider = document.getElementById("slider");
        slider.addEventListener("touchstart", e => startX = e.touches[0].clientX);
        slider.addEventListener("touchend", e => {
            let endX = e.changedTouches[0].clientX;
            if (startX - endX > 50) nextSlide();
            else if (startX - endX < -50) prevSlide();
        });
    });

    function startExperience() {
        if (music) music.play().catch(() => {});
        document.getElementById("msg").style.display = "block";
        document.getElementById("startBtn").style.display = "none";
        
        // Start automatic effects
        setInterval(createHeart, 300);
        showSlide(0);
    }

    function showSlide(i) {
        // Clear any existing timer to prevent slide jumping
        clearTimeout(timer);

        slides.forEach(slide => {
            slide.classList.remove("active");
            if (slide.tagName === "VIDEO") {
                slide.pause();
                slide.currentTime = 0;
            }
        });

        index = (i + slides.length) % slides.length;
        let current = slides[index];
        current.classList.add("active");

        if (current.tagName === "VIDEO") {
            if (music) music.pause();
            current.play();
            current.onended = () => {
                if (music) music.play();
                nextSlide();
            };
        } else {
            // Photos move automatically every 3 seconds
            timer = setTimeout(nextSlide, 3000);
        }
    }

    function nextSlide() { showSlide(index + 1); }
    function prevSlide() { showSlide(index - 1); }

    function createHeart() {
        const heart = document.createElement("div");
        heart.classList.add("heart");
        const symbols = ["💖", "❤️", "💕", "✨"];
        heart.innerHTML = symbols[Math.floor(Math.random() * symbols.length)];

        heart.style.left = Math.random() * 100 + "vw";
        heart.style.animationDuration = (3 + Math.random() * 3) + "s";
        heart.style.fontSize = (15 + Math.random() * 15) + "px";

        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 6000);
    }
</script>

</body>
</html>
