<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Anniversary ❤️</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    color: white;
    text-align: center;
    overflow: hidden;
}

/* Layout */
.container {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px;
}

/* Text */
h1 { font-size: 6vw; margin: 10px; }
h2 { font-size: 4.5vw; margin: 5px; }
p  { font-size: 4vw; margin: 10px; }

/* 🌟 BIG FRAME */
.frame {
    width: 92%;
    max-width: 380px;
    height: 65vh;
    max-height: 520px;
    background: rgba(255,255,255,0.15);
    border-radius: 25px;
    padding: 10px;
    backdrop-filter: blur(10px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

/* Slideshow */
.slideshow {
    width: 100%;
    height: 100%;
    border-radius: 20px;
    overflow: hidden;
    position: relative;
}

.slideshow img,
.slideshow video {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: contain;   /* 🔥 FIX: full image visible */
    background: black;     /* fills empty space nicely */
    opacity: 0;
    transition: opacity 1s;
}

.active {
    opacity: 1 !important;
}

/* Button */
button {
    margin-top: 15px;
    padding: 10px 20px;
    border: none;
    border-radius: 25px;
    background: white;
    color: #ff6f91;
    font-size: 4vw;
    cursor: pointer;
}

/* Floating hearts */
.heart {
    position: absolute;
    bottom: -10px;
    font-size: 20px;
    animation: floatUp linear infinite;
}

@keyframes floatUp {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-100vh); opacity: 0; }
}
</style>
</head>

<body>

<div class="container">

    <h1>🎉 Happy 4th Marriage Anniversary 🎉</h1>
    <h2>Dear Bhaiya ❤️ Bhabhi</h2>

    <p>
        Celebrating 4 beautiful years of love, laughter 💕<br>
        Your bond is truly inspiring ✨
    </p>

    <!-- 🌟 BIG FRAME -->
    <div class="frame">
        <div class="slideshow">
            <img src="photo1.jpg" class="active">
            <img src="photo2.jpg">
            <img src="photo3.jpg">

            <video muted playsinline>
                <source src="video.mp4" type="video/mp4">
            </video>

            <img src="photo4.jpg">
        </div>
    </div>

    <button onclick="startExperience()">Start 💖</button>

    <p id="msg" style="display:none;">
        May your journey always be filled with endless love ❤️,<br>
        joy 😊, and beautiful memories ✨<br><br>
        Stay happy forever 🥰
    </p>

    <!-- 🎵 MUSIC -->
    <audio id="bgMusic" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

</div>

<script>
let slides, index = 0, startX = 0, endX = 0, music;

document.addEventListener("DOMContentLoaded", () => {
    slides = document.querySelectorAll(".slideshow img, .slideshow video");
    music = document.getElementById("bgMusic");

    showSlide(index);

    const slideshow = document.querySelector(".slideshow");

    slideshow.addEventListener("touchstart", e => {
        startX = e.touches[0].clientX;
    });

    slideshow.addEventListener("touchend", e => {
        endX = e.changedTouches[0].clientX;
        let diff = startX - endX;

        if (diff > 50) nextSlide();
        else if (diff < -50) prevSlide();
    });
});

function startExperience() {
    if (music) music.play().catch(()=>{});
    document.getElementById("msg").style.display = "block";
}

function showSlide(i) {
    slides.forEach(slide => {
        slide.classList.remove("active");
        if (slide.tagName === "VIDEO") {
            slide.pause();
            slide.currentTime = 0;
        }
    });

    let current = slides[i];
    current.classList.add("active");

    if (current.tagName === "VIDEO") {
        if (music) music.pause();
        current.play();

        current.onended = () => {
            if (music) music.play();
            nextSlide();
        };
    } else {
        if (music && music.paused) music.play();
        setTimeout(nextSlide, 2500);
    }
}

function nextSlide() {
    index = (index + 1) % slides.length;
    showSlide(index);
}

function prevSlide() {
    index = (index - 1 + slides.length) % slides.length;
    showSlide(index);
}

/* Hearts */
function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "💖";

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (3 + Math.random() * 3) + "s";

    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 6000);
}
setInterval(createHeart, 300);
</script>

</body>
</html>
